{% extends "base.html" %}
{% block title %}Comparing Playlists{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto mt-20 text-center">
  <h1 class="text-2xl font-bold mb-2">Comparing playlists</h1>
  <p id="phase-label" class="text-gray-400 mb-8">Starting…</p>

  <div class="w-full h-3 bg-surface2 rounded-full overflow-hidden mb-3">
    <div id="progress-bar"
         class="h-full bg-gradient-to-r from-spotify to-youtube rounded-full transition-[width] duration-500 ease-out"
         style="width:0%"></div>
  </div>
  <p id="progress-pct" class="text-sm text-gray-500 mb-2">0 / 0</p>

  <p id="error-msg" class="mt-6 text-red-400 text-sm hidden"></p>
  <a id="error-back" href="/select" class="mt-3 hidden text-sm text-blue-400 hover:underline">&larr; Back to playlist selection</a>
</div>

<script>
(function () {
  var jobId = "{{ job_id }}";
  var bar   = document.getElementById("progress-bar");
  var pct   = document.getElementById("progress-pct");
  var phase = document.getElementById("phase-label");
  var err   = document.getElementById("error-msg");
  var back  = document.getElementById("error-back");

  function poll() {
    fetch("/compare/status/" + jobId)
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.status === "done") {
          bar.style.width = "100%";
          window.location.href = data.redirect;
          return;
        }
        if (data.status === "error") {
          err.textContent = "Error: " + (data.error || "Unknown error");
          err.classList.remove("hidden");
          back.classList.remove("hidden");
          phase.textContent = "Something went wrong.";
          return;
        }
        var cur  = data.current || 0;
        var tot  = data.total  || 1;
        var w    = Math.round((cur / tot) * 100);
        bar.style.width = w + "%";
        pct.textContent = cur + " / " + tot + " songs";
        phase.textContent = data.phase || "Working…";
        setTimeout(poll, 350);
      })
      .catch(function() {
        setTimeout(poll, 1500);
      });
  }
  poll();
})();
</script>
{% endblock %}
